x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env.${ENV:-local}
  volumes:
    - .:/app
  environment:
    - PYTHONUNBUFFERED=1
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
    env_file:
      -  .env.${ENV:-local}
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker_mail:
    <<: *worker-base
    command: rq worker mail_processing --url ${REDIS_URL}

  worker_foto:
    <<: *worker-base
    command: rq worker foto_processing --url ${REDIS_URL}

  worker_email:
    <<: *worker-base
    command: rq worker emails --url ${REDIS_URL}

  redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: